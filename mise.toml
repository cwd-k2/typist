[tasks.deps]
description = "Install dependencies"
run = "carton install"

[tasks.test]
description = "Run all tests"
depends = ["test:core", "test:static", "test:lsp", "test:critic", "test:e2e", "test:workspace"]

[tasks."test:core"]
description = "Run core type system tests"
run = "carton exec -- prove -l t/"

[tasks."test:static"]
description = "Run static analysis tests"
run = "carton exec -- prove -l t/static/"

[tasks."test:lsp"]
description = "Run LSP server tests"
run = "carton exec -- prove -l t/lsp/"

[tasks."test:critic"]
description = "Run Perl::Critic policy tests"
run = "carton exec -- prove -l t/critic/"

[tasks."test:e2e"]
description = "Run LSP E2E smoke test"
run = "carton exec -- perl t/lsp/e2e_smoke.pl"

[tasks."test:workspace"]
description = "Verify LSP workspace on realworld example"
run = "carton exec -- perl script/lsp-verify-workspace"

[tasks.example]
description = "Run all examples"
depends = ["example:basics", "example:generics", "example:effects", "example:haskell", "example:errors_basic", "example:errors_advanced", "example:realworld"]

[tasks."example:basics"]
description = "Run basics example"
run = "carton exec -- perl example/basics.pl"

[tasks."example:generics"]
description = "Run generics example"
run = "carton exec -- perl example/generics.pl"

[tasks."example:effects"]
description = "Run effects example"
run = "carton exec -- perl example/effects.pl"

[tasks."example:haskell"]
description = "Run Haskell-like type system example"
run = "carton exec -- perl example/haskell.pl"

[tasks."example:errors_basic"]
description = "Run basic type error examples"
run = "carton exec -- perl example/errors_basic.pl"

[tasks."example:errors_advanced"]
description = "Run advanced type error examples"
run = "carton exec -- perl example/errors_advanced.pl"

[tasks."example:realworld"]
description = "Run realworld multi-file shop example"
run = "carton exec -- perl -Iexample/realworld/lib example/realworld/main.pl"
