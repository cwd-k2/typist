[tasks.check]
description = "Run typist-check static analysis"
run = "carton exec -- perl bin/typist-check"

[tasks.deps]
description = "Install dependencies"
run = "carton install"

[tasks.test]
description = "Run all tests"
depends = ["test:core", "test:static", "test:lsp", "test:critic", "test:e2e"]

[tasks."test:core"]
description = "Run core type system tests"
run = "carton exec -- prove -l t/"

[tasks."test:static"]
description = "Run static analysis tests"
run = "carton exec -- prove -l t/static/"

[tasks."test:lsp"]
description = "Run LSP server tests"
run = "carton exec -- prove -l t/lsp/"

[tasks."test:critic"]
description = "Run Perl::Critic policy tests"
run = "carton exec -- prove -l t/critic/"

[tasks."test:e2e"]
description = "Run LSP E2E smoke test"
run = "carton exec -- perl t/lsp/e2e_smoke.pl"

[tasks.example]
description = "Run all examples"
depends = ["example:foundations", "example:composite", "example:generics", "example:nominal", "example:algebraic", "example:typeclasses", "example:effects", "example:gradual", "example:hof", "example:chains"]

[tasks."example:foundations"]
description = "Run foundations example (types, aliases, functions)"
run = "carton exec -- perl example/01_foundations.pl"

[tasks."example:composite"]
description = "Run composite types example (Struct, Union, Maybe, etc.)"
run = "carton exec -- perl example/02_composite_types.pl"

[tasks."example:generics"]
description = "Run generics example (type params, bounded quantification)"
run = "carton exec -- perl example/03_generics.pl"

[tasks."example:nominal"]
description = "Run nominal types example (newtype, literals, recursive)"
run = "carton exec -- perl example/04_nominal_types.pl"

[tasks."example:algebraic"]
description = "Run algebraic types example (datatype, ADT)"
run = "carton exec -- perl example/05_algebraic_types.pl"

[tasks."example:typeclasses"]
description = "Run type classes example (dispatch, HKT, Functor)"
run = "carton exec -- perl example/06_typeclasses.pl"

[tasks."example:effects"]
description = "Run effects example (perform, handle, row polymorphism)"
run = "carton exec -- perl example/07_effects.pl"

[tasks."example:gradual"]
description = "Run gradual typing example (flow typing, inference)"
run = "carton exec -- perl example/08_gradual_typing.pl"

[tasks."example:hof"]
description = "Run higher-order function inference example"
run = "carton exec -- perl example/10_higher_order.pl"

[tasks."example:chains"]
description = "Run method chain example (struct accessors, newtype ->base)"
run = "carton exec -- perl example/12_method_chains.pl"

[tasks.bench]
description = "Run all benchmarks"
run = """
for f in bench/*.pl; do
  echo ""
  carton exec -- perl "$f"
done
"""

[tasks."bench:quick"]
description = "Run a single benchmark (e.g. mise run bench:quick bench/01_parser.pl)"
run = "carton exec -- perl"

[tasks."bench:phases"]
description = "Run analyzer phase breakdown benchmark"
run = "carton exec -- perl bench/09_analyzer_phases.pl"

[tasks."vscode:deps"]
description = "Install VSCode extension dependencies"
dir = "editors/vscode"
run = "npm install"

[tasks."vscode:build"]
description = "Build VSCode extension"
dir = "editors/vscode"
run = "npm run build"

[tasks."vscode:package"]
description = "Package VSCode extension (.vsix)"
dir = "editors/vscode"
run = "npm run package"

[tasks."vscode:install"]
description = "Build, package, and install VSCode extension"
dir = "editors/vscode"
run = "npm run package && code --install-extension typist-*.vsix"
